<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>กัส 💖</title>
  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&family=Sriracha&display=swap" rel="stylesheet">
</head>
<body>

  <div class="progress-container">
    <div class="progress-bar" id="my"></div>
  </div>

  <div class="nav-container">
    <button class="menu-toggle" onclick="toggleMenu()">MENU ☰</button>
    <div class="menu-list" id="menuList">
      <a href="love.html">Love 💌</a>
      <a href="time.html">Our Time ⏰</a>
      <a href="music.html" target="_blank">Music 🎶</a>
      <a href="birth.html">About You 🎁</a>
      <a href="contack.html">Contact Me 📞</a>
    </div>
  </div>
  <script>
    function toggleMenu() {
      const menu = document.getElementById('menuList');
      menu.classList.toggle('active');
    }

    window.onscroll = function() {
      let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      let scrolled = (winScroll / height) * 100;
      document.getElementById("myBar").style.width = scrolled + "%";
    };
  </script>
  <footer class="glass-footer">
    <div class="footer-content">
        <div class="footer-left">
            &copy; 2026 <span class="brand-name">GUS CREATIVE</span>. ALL RIGHTS RESERVED BETA VERSIOn
        </div>
        <div class="footer-right">
            <span id="live-clock">00:00:00</span>
            <span class="status-indicator"></span>
        </div>
    </div>
</footer>

<script>
    function updateClock() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('live-clock').textContent = `${hours}:${minutes}:${seconds}`;
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
